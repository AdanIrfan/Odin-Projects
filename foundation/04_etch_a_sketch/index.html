<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EtchaSketch</title>
    <style>
        *{
            box-sizing: border-box;
        }
        #container{
            display: flex;
            flex-wrap: wrap;
            width: 960px;
            height: 960px;
            margin: 0 auto;
        }
        .square{
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <button id="btn">Resize</button>

    <script>
        const container = document.querySelector("#container");
        for(let i = 0; i < 16; i++){
            for(let j = 0; j < 16; j++){
            const div = document.createElement("div");
            container.appendChild(div)
            div.classList.add("square")
            div.dataset.opacity = 0;
            div.addEventListener("mouseover", (e)=>{
                let currentOpacity = Number(e.target.dataset.opacity);
                if(currentOpacity < 1){
                    currentOpacity += 0.1;
                    e.target.dataset.opacity = currentOpacity;

                    let r = Math.floor(Math.random() * 256);
                    let g = Math.floor(Math.random() * 256);
                    let b = Math.floor(Math.random() * 256);

                    e.target.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
                    e.target.style.opacity = currentOpacity;
                }
            })
            div.style.width = `60px`;
            div.style.height = `60px`;
            }
        }

        //Dynamic grid resize using button
        const btn = document.querySelector("#btn");
        btn.addEventListener("click",()=>{
            const num = Number(prompt('Enter the grid size:'));
            let size = 960/num;
            if (num > 0 && num < 100 && !isNaN(num)){
                container.replaceChildren();
                for(let i = 0; i < num; i++){
                    for(let j = 0; j < num; j++){
                    const div = document.createElement("div");
                    container.appendChild(div);
                    div.classList.add("square");
                    div.addEventListener("mouseover", (e)=> e.target.style.backgroundColor="black");
                    div.style.width = `${size}px`;
                    div.style.height = `${size}px`;
                    }
                }
            }
        })
    </script>
</body>
</html>
